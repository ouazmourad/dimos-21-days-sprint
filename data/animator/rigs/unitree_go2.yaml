# Character rig for the Unitree Go1/Go2 quadruped.
#
# The Go2 has 12 joints (4 legs x 3) and no head, no arms, no neck.
# So every expressive channel is implemented through composite
# "virtual joints" that the retargeter decomposes into per-leg
# offsets relative to the default standing pose.
#
# Virtual joint definitions:
#   trunk_yaw    — rotate body around z (left/right "look")
#   trunk_pitch  — tilt body around y (nose up/down "look")
#   trunk_roll   — tilt body around x (side-to-side lean)
#   trunk_z      — uniform leg extension (squat / breathe / standing tall)
#   trunk_x      — symmetric forward/back body shift (approach / recoil)
#   paw_lift_fl  — lift front-left foot off the ground (the only "gesture"
#                  channel a Go2 has, used for waves / acknowledgments).

robot: unitree_go1

# Standing pose from the Go1 menagerie keyframe "home".
default_pose:
  FR_hip_joint: -0.1
  FR_thigh_joint: 0.9
  FR_calf_joint: -1.8
  FL_hip_joint: 0.1
  FL_thigh_joint: 0.9
  FL_calf_joint: -1.8
  RR_hip_joint: -0.1
  RR_thigh_joint: 0.9
  RR_calf_joint: -1.8
  RL_hip_joint: 0.1
  RL_thigh_joint: 0.9
  RL_calf_joint: -1.8

roles:
  - joint: trunk_yaw
    channel: gaze
    max_offset_rad: 0.6
    speed_limit_rad_s: 1.5
    virtual: true
  - joint: trunk_pitch
    channel: gaze
    max_offset_rad: 0.25
    speed_limit_rad_s: 1.0
    virtual: true
  - joint: trunk_roll
    channel: posture
    max_offset_rad: 0.15
    speed_limit_rad_s: 0.8
    virtual: true
  - joint: trunk_z
    channel: posture
    max_offset_rad: 0.12
    speed_limit_rad_s: 0.6
    virtual: true
  - joint: trunk_x
    channel: posture
    max_offset_rad: 0.10
    speed_limit_rad_s: 0.6
    virtual: true
  - joint: trunk_z_breath
    channel: breathing
    max_offset_rad: 0.03
    speed_limit_rad_s: 0.2
    virtual: true
  - joint: paw_lift_fl
    channel: gesture
    max_offset_rad: 0.6
    speed_limit_rad_s: 2.0
    virtual: true
